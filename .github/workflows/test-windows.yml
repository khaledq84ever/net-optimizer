name: Test on real Windows

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "measure-only"
        type: choice
        options:
          - measure-only
          - report
          - apply
          - revert
  push:
    branches: [main]
    paths:
      - "Optimize-Internet.ps1"
      - ".github/workflows/test-windows.yml"

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Show environment
        shell: pwsh
        run: |
          $identity  = [Security.Principal.WindowsIdentity]::GetCurrent()
          $principal = [Security.Principal.WindowsPrincipal]::new($identity)
          $admin     = $principal.IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
          Write-Host "PowerShell: $($PSVersionTable.PSVersion)"
          Write-Host "OS:         $([System.Environment]::OSVersion.VersionString)"
          Write-Host "Admin:      $admin"

      - name: Parse-only sanity check
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD\Optimize-Internet.ps1", [ref]$null, [ref]$errors) | Out-Null
          if ($errors -and $errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }
          Write-Host "Parse OK"

      - name: PSScriptAnalyzer
        shell: pwsh
        continue-on-error: true
        run: |
          if (-not (Get-Module -ListAvailable PSScriptAnalyzer)) {
            Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          }
          Invoke-ScriptAnalyzer -Path Optimize-Internet.ps1 -Severity Warning,Error |
            Format-Table -AutoSize

      - name: Run net-optimizer (${{ inputs.mode || 'measure-only' }})
        shell: pwsh
        run: |
          $mode = "${{ inputs.mode || 'measure-only' }}"
          $params = @{}
          switch ($mode) {
            "report"  { $params['Report'] = $true }
            "apply"   { $params['Apply']  = $true; $params['Report'] = $true }
            "revert"  { $params['Revert'] = $true }
            default   { }  # measure-only = no params
          }
          Write-Host "Running: .\Optimize-Internet.ps1 (mode=$mode)"
          & .\Optimize-Internet.ps1 @params
          Write-Host "ExitCode: $LASTEXITCODE"

      - name: Show generated log (tail)
        if: always()
        shell: pwsh
        run: |
          $logs = Get-ChildItem -Path . -Filter "net-optimizer-*.log" -ErrorAction SilentlyContinue
          foreach ($l in $logs) {
            Write-Host "=== $($l.Name) ==="
            Get-Content $l.FullName -Tail 60
          }

      - name: Upload artifacts (log + report + backup json)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: net-optimizer-output-${{ github.run_number }}
          path: |
            net-optimizer-*.log
            net-optimizer-*.html
            net-optimizer-backup-*.json
          if-no-files-found: ignore
          retention-days: 30
