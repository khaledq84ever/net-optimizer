<svg xmlns="http://www.w3.org/2000/svg" width="860" height="360" viewBox="0 0 860 360" font-family="Segoe UI, Inter, system-ui, sans-serif">
  <rect width="860" height="360" rx="16" fill="#0a0e1a"/>
  <rect x="1" y="1" width="858" height="358" rx="15" fill="none" stroke="#1e2640"/>

  <text x="32" y="46" fill="#f8fafc" font-size="22" font-weight="700">What is bufferbloat?</text>
  <text x="32" y="72" fill="#94a3b8" font-size="14.5">Your ping while the link is <tspan fill="#e5e7eb" font-weight="600">idle</tspan> vs while it's <tspan fill="#e5e7eb" font-weight="600">busy</tspan>. The jump is what lags games &amp; calls.</text>

  <!-- chart area -->
  <g transform="translate(32,108)">
    <!-- axes -->
    <line x1="0" y1="0" x2="0" y2="180" stroke="#334155" stroke-width="1.5"/>
    <line x1="0" y1="180" x2="540" y2="180" stroke="#334155" stroke-width="1.5"/>
    <text x="-8" y="6" fill="#64748b" font-size="11" text-anchor="end">ms</text>

    <!-- idle baseline region -->
    <rect x="0" y="150" width="200" height="30" fill="#22c55e" opacity="0.10"/>
    <polyline fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"
      points="0,160 40,158 80,162 120,159 160,161 200,160"/>
    <text x="100" y="205" fill="#22c55e" font-size="13" font-weight="600" text-anchor="middle">idle &#8776; 18 ms</text>

    <!-- download starts marker -->
    <line x1="200" y1="0" x2="200" y2="180" stroke="#475569" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="208" y="14" fill="#94a3b8" font-size="12">big download starts &#8595;</text>

    <!-- loaded spike -->
    <polyline fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
      points="200,160 230,120 270,60 320,40 380,48 440,38 500,52 540,44"/>
    <rect x="200" y="30" width="340" height="130" fill="#ef4444" opacity="0.07"/>
    <text x="370" y="22" fill="#ef4444" font-size="13" font-weight="600" text-anchor="middle">loaded &#8776; 145 ms  (+127 ms)</text>
  </g>

  <!-- grade scale -->
  <g transform="translate(620,108)" font-size="13">
    <text x="0" y="-2" fill="#94a3b8" font-size="13" font-weight="600">GRADE</text>
    <g transform="translate(0,12)">
      <rect width="200" height="26" rx="6" fill="#0d1224" stroke="#1e2640"/><circle cx="16" cy="13" r="6" fill="#22c55e"/><text x="32" y="18" fill="#cbd5e1">A+ / A &#8212; &lt; 30 ms jump</text>
    </g>
    <g transform="translate(0,46)">
      <rect width="200" height="26" rx="6" fill="#0d1224" stroke="#1e2640"/><circle cx="16" cy="13" r="6" fill="#84cc16"/><text x="32" y="18" fill="#cbd5e1">B &#8212; 30&#8211;60 ms</text>
    </g>
    <g transform="translate(0,80)">
      <rect width="200" height="26" rx="6" fill="#0d1224" stroke="#1e2640"/><circle cx="16" cy="13" r="6" fill="#eab308"/><text x="32" y="18" fill="#cbd5e1">C &#8212; 60&#8211;100 ms</text>
    </g>
    <g transform="translate(0,114)">
      <rect width="200" height="26" rx="6" fill="#0d1224" stroke="#1e2640"/><circle cx="16" cy="13" r="6" fill="#f97316"/><text x="32" y="18" fill="#cbd5e1">D &#8212; 100&#8211;200 ms</text>
    </g>
    <g transform="translate(0,148)">
      <rect width="200" height="26" rx="6" fill="#0d1224" stroke="#1e2640"/><circle cx="16" cy="13" r="6" fill="#ef4444"/><text x="32" y="18" fill="#cbd5e1">F &#8212; &gt; 200 ms</text>
    </g>
  </g>

  <text x="32" y="345" fill="#475569" font-size="12.5">Fix: enable SQM / "Smart Queue" on your router. Windows can't fix bufferbloat — but this tool measures &amp; grades it.</text>
</svg>
