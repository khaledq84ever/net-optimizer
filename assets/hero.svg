<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" font-family="Segoe UI, Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="380" rx="0" fill="url(#bg)"/>
  <rect width="1200" height="380" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#162038" stroke-width="1">
    <line x1="0" y1="95" x2="1200" y2="95"/>
    <line x1="0" y1="190" x2="1200" y2="190"/>
    <line x1="0" y1="285" x2="1200" y2="285"/>
  </g>

  <!-- waveform / latency line motif -->
  <polyline fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
    points="60,300 130,290 200,250 270,265 340,150 410,175 480,120 550,190 620,90 690,160 760,130 830,200 900,150 970,210 1040,170 1110,205"/>
  <polyline fill="none" stroke="#22c55e" stroke-width="2.5" stroke-opacity="0.55" stroke-linecap="round" stroke-linejoin="round"
    points="60,330 200,322 340,326 480,318 620,322 760,316 900,320 1040,314 1140,318"/>

  <!-- logo bolt -->
  <g transform="translate(70,58)">
    <rect width="64" height="64" rx="16" fill="url(#accent)"/>
    <path d="M36 12 L20 38 H32 L28 54 L46 26 H34 Z" fill="#0a0e1a"/>
  </g>

  <text x="152" y="86" fill="#f8fafc" font-size="46" font-weight="800" letter-spacing="-1">Internet Optimizer</text>
  <text x="154" y="124" fill="#94a3b8" font-size="21" font-weight="500">for Windows 10 &amp; 11 — measure, fix what's broken, prove it helped</text>

  <!-- pills -->
  <g font-size="15" font-weight="600">
    <g transform="translate(154,150)">
      <rect width="186" height="34" rx="17" fill="#11203b" stroke="#1e3a5f"/>
      <circle cx="20" cy="17" r="5" fill="#3b82f6"/>
      <text x="34" y="22" fill="#cbd5e1">Download / Upload</text>
    </g>
    <g transform="translate(350,150)">
      <rect width="150" height="34" rx="17" fill="#11203b" stroke="#1e3a5f"/>
      <circle cx="20" cy="17" r="5" fill="#8b5cf6"/>
      <text x="34" y="22" fill="#cbd5e1">Ping + Jitter</text>
    </g>
    <g transform="translate(510,150)">
      <rect width="168" height="34" rx="17" fill="#11203b" stroke="#1e3a5f"/>
      <circle cx="20" cy="17" r="5" fill="#eab308"/>
      <text x="34" y="22" fill="#cbd5e1">Bufferbloat A&#8594;F</text>
    </g>
    <g transform="translate(688,150)">
      <rect width="150" height="34" rx="17" fill="#11203b" stroke="#1e3a5f"/>
      <circle cx="20" cy="17" r="5" fill="#22c55e"/>
      <text x="34" y="22" fill="#cbd5e1">Fastest DNS</text>
    </g>
  </g>

  <!-- grade badge -->
  <g transform="translate(980,150)">
    <rect width="150" height="150" rx="24" fill="#0d1530" stroke="#22c55e" stroke-opacity="0.5"/>
    <circle cx="75" cy="68" r="46" fill="none" stroke="#22c55e" stroke-opacity="0.18" stroke-width="10"/>
    <circle cx="75" cy="68" r="46" fill="none" stroke="#22c55e" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="245 289" transform="rotate(-90 75 68)"/>
    <text x="75" y="84" fill="#22c55e" font-size="48" font-weight="800" text-anchor="middle">A</text>
    <text x="75" y="124" fill="#94a3b8" font-size="14" font-weight="600" text-anchor="middle">quality score</text>
  </g>

  <!-- footer strip -->
  <text x="70" y="345" fill="#475569" font-size="15" font-weight="500">No boosters &#183; no third-party downloads &#183; backs up every change &#183; one-command revert</text>
</svg>
