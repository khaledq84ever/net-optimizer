<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="200" viewBox="0 0 1100 200" font-family="'Segoe UI',Roboto,Arial,sans-serif">
  <defs>
    <linearGradient id="b2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d1a30"/><stop offset="1" stop-color="#0a1426"/></linearGradient>
    <linearGradient id="num" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>
  </defs>
  <rect width="1100" height="200" rx="16" fill="url(#b2)" stroke="#1e2d4a" stroke-width="1.5"/>

  <!-- arrows -->
  <g stroke="#22d3ee" stroke-width="2.5" fill="none" opacity="0.8">
    <path d="M262 100 H300 m-10 -6 l10 6 l-10 6"/>
    <path d="M532 100 H570 m-10 -6 l10 6 l-10 6"/>
    <path d="M802 100 H840 m-10 -6 l10 6 l-10 6"/>
  </g>

  <!-- step template -->
  <g>
    <rect x="22"  y="44" width="240" height="112" rx="14" fill="#11233f" stroke="#27466b"/>
    <circle cx="58" cy="80" r="18" fill="url(#num)"/><text x="58" y="86" text-anchor="middle" fill="#06121f" font-size="18" font-weight="800">1</text>
    <text x="88" y="78" fill="#e2e8f0" font-size="19" font-weight="700">MEASURE</text>
    <text x="42" y="120" fill="#9fb3cd" font-size="14">Download &amp; upload speed,</text>
    <text x="42" y="140" fill="#9fb3cd" font-size="14">ping, packet loss, DNS time</text>
  </g>
  <g>
    <rect x="292" y="44" width="240" height="112" rx="14" fill="#11233f" stroke="#27466b"/>
    <circle cx="328" cy="80" r="18" fill="url(#num)"/><text x="328" y="86" text-anchor="middle" fill="#06121f" font-size="18" font-weight="800">2</text>
    <text x="358" y="78" fill="#e2e8f0" font-size="19" font-weight="700">DETECT</text>
    <text x="312" y="120" fill="#9fb3cd" font-size="14">Inspect live settings, flag</text>
    <text x="312" y="140" fill="#9fb3cd" font-size="14">only the REAL problems</text>
  </g>
  <g>
    <rect x="562" y="44" width="240" height="112" rx="14" fill="#11233f" stroke="#27466b"/>
    <circle cx="598" cy="80" r="18" fill="url(#num)"/><text x="598" y="86" text-anchor="middle" fill="#06121f" font-size="18" font-weight="800">3</text>
    <text x="628" y="78" fill="#e2e8f0" font-size="19" font-weight="700">FIX</text>
    <text x="582" y="120" fill="#9fb3cd" font-size="14">Back up first, then fix</text>
    <text x="582" y="140" fill="#9fb3cd" font-size="14">only what's broken</text>
  </g>
  <g>
    <rect x="832" y="44" width="246" height="112" rx="14" fill="#11233f" stroke="#27466b"/>
    <circle cx="868" cy="80" r="18" fill="url(#num)"/><text x="868" y="86" text-anchor="middle" fill="#06121f" font-size="18" font-weight="800">4</text>
    <text x="898" y="78" fill="#e2e8f0" font-size="19" font-weight="700">VERIFY</text>
    <text x="852" y="120" fill="#9fb3cd" font-size="14">Re-test &amp; show before/after</text>
    <text x="852" y="140" fill="#9fb3cd" font-size="14">— revert anytime</text>
  </g>
</svg>
